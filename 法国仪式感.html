<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>巴黎投递仪式 - 实景动态分镜</title>
    <style>
        :root {
            --bg-color: #f0f0f0;
            --envelope-color: #fdfbf7;
            --wax-color: #b91c1c;
            --paris-night: #020617;
            --postbox-yellow: #eab308;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }

        /* 手机竖屏容器 */
        .phone-container {
            width: 360px;
            height: 640px;
            background: #fff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border-radius: 12px;
        }

        /* 实景背景图 */
        .paris-real-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&q=80&w=1080');
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2.5s ease-in-out, transform 8s ease-out;
            z-index: 1;
            filter: brightness(0.7);
        }

        /* 背景微弱遮罩，增强文字可读性 */
        .paris-real-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.5));
        }

        /* 塞纳河波光微动效 */
        .river-reflection {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            background: linear-gradient(transparent, rgba(255,255,255,0.1));
            z-index: 2;
            mix-blend-mode: overlay;
            animation: wave 4s infinite alternate ease-in-out;
            opacity: 0;
        }

        @keyframes wave {
            from { transform: translateY(0) scaleY(1); }
            to { transform: translateY(5px) scaleY(1.1); }
        }

        /* 信封 */
        .envelope {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(2.2); 
            width: 200px;
            height: 140px;
            background: var(--envelope-color);
            border-radius: 2px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 10;
            transition: all 1.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 火漆印 */
        .wax-seal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 42px;
            height: 42px;
            background: var(--wax-color);
            border-radius: 50%;
            z-index: 12;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 2px 5px rgba(0,0,0,0.3);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffbba6;
            font-family: serif;
            font-size: 14px;
            letter-spacing: 1px;
            font-weight: bold;
            border: 1px solid rgba(0,0,0,0.1);
        }

        /* 铜质印章 */
        .stamp {
            position: absolute;
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            width: 46px;
            height: 12px;
            background: linear-gradient(to right, #92400e, #fcd34d, #92400e);
            border-radius: 3px;
            z-index: 13;
            transition: top 0.6s ease-in;
            box-shadow: 0 10px 15px rgba(0,0,0,0.5);
        }
        .stamp::before {
            content: '';
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 75px;
            background: linear-gradient(to right, #3e2723, #5d4037, #211512);
            border-radius: 12px 12px 2px 2px;
        }
        .stamp::after {
            content: '';
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 28px;
            height: 6px;
            background: linear-gradient(to right, #b45309, #fef08a, #b45309);
            border-radius: 2px;
        }

        /* La Poste 邮筒 */
        .postbox {
            position: absolute;
            bottom: -320px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 260px;
            background: var(--postbox-yellow);
            border-radius: 15px 15px 5px 5px;
            z-index: 20;
            box-shadow: inset -10px -10px 40px rgba(0,0,0,0.2), 0 10px 40px rgba(0,0,0,0.6);
            transition: bottom 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        .postbox-slot {
            position: absolute;
            top: 45px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 12px;
            background: #1a1a1a;
            border-radius: 6px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,1);
        }
        .postbox-logo {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            border: 2px solid #222;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: 900;
            color: #222;
            text-align: center;
            line-height: 1.1;
        }

        /* 结尾文字 */
        .final-text {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            text-align: center;
            width: 100%;
            opacity: 0;
            z-index: 30;
            transition: opacity 2.5s ease;
            text-shadow: 0 0 20px rgba(0,0,0,1), 0 2px 5px rgba(0,0,0,1);
        }

        .title-main {
            font-size: 26px;
            font-weight: 400;
            letter-spacing: 6px;
            margin-bottom: 10px;
            display: block;
        }

        .title-en {
            font-size: 14px;
            letter-spacing: 2px;
            color: #cbd5e1;
            margin-bottom: 30px;
            display: block;
        }

        .waiting-text {
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 8px;
            color: #fcd34d; /* 金色字体 */
            display: block;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1.5s ease 1s;
        }

        /* 按钮 */
        .replay-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            cursor: pointer;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s, background 0.3s;
            backdrop-filter: blur(5px);
            font-size: 14px;
        }
        .replay-btn:hover { background: rgba(255,255,255,0.25); }

        /* 动画控制类 */
        .step-stamp-down .stamp { top: 50%; transform: translate(-50%, -110%); }
        .step-wax-expand .wax-seal { transform: translate(-50%, -50%) scale(1); }
        .step-stamp-up .stamp { top: -250px; }
        
        .step-show-real .paris-real-bg { opacity: 1; transform: scale(1.05); }
        .step-show-real .river-reflection { opacity: 1; }
        .step-show-real .envelope { 
            transform: translate(-50%, -180px) scale(0.5); 
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }
        
        .step-show-postbox .postbox { bottom: 0; }
        
        /* 投递仪式 */
        .step-deliver .envelope {
            transform: translate(-50%, 115px) scale(0.25) rotateX(45deg);
            opacity: 0;
            filter: brightness(0.3);
            transition: all 1.5s cubic-bezier(0.5, 0, 0.5, 1);
        }

        .step-final-text .final-text { opacity: 1; }
        .step-final-text .waiting-text { opacity: 1; transform: translateY(0); }
        .step-final-text .replay-btn { opacity: 1; pointer-events: auto; }

    </style>
</head>
<body>

    <div class="phone-container" id="scene">
        <!-- 场景2：实景巴黎背景 -->
        <div class="paris-real-bg"></div>
        <div class="river-reflection"></div>

        <!-- 场景3：La Poste 邮筒 -->
        <div class="postbox">
            <div class="postbox-slot"></div>
            <div class="postbox-logo">LA<br>POSTE</div>
        </div>

        <!-- 场景1：信封与火漆 -->
        <div class="envelope" id="envelope">
            <div class="wax-seal">D21</div>
        </div>
        <div class="stamp" id="stamp"></div>

        <!-- 场景4：品牌寄语 -->
        <div class="final-text">
            <span class="title-main">一份来自巴黎的惊喜</span>
            <span class="title-en">A SURPRISE FROM PARIS</span>
            <span class="waiting-text">等待查收</span>
        </div>

        <button class="replay-btn" onclick="startAnimation()">重新播放仪式</button>
    </div>

    <script>
        const scene = document.getElementById('scene');
        let timeouts = [];

        function clearAllTimeouts() {
            timeouts.forEach(t => clearTimeout(t));
            timeouts = [];
        }

        function resetScene() {
            scene.className = 'phone-container';
            // 强制重绘
            void scene.offsetWidth;
        }

        function startAnimation() {
            clearAllTimeouts();
            resetScene();

            // 0.8s - 铜质印章压下
            timeouts.push(setTimeout(() => {
                scene.classList.add('step-stamp-down');
            }, 800));

            // 1.3s - D21火漆印成型
            timeouts.push(setTimeout(() => {
                scene.classList.add('step-wax-expand');
            }, 1300));

            // 2.2s - 印章移开
            timeouts.push(setTimeout(() => {
                scene.classList.add('step-stamp-up');
            }, 2200));

            // 3.2s - 镜头拉远
            timeouts.push(setTimeout(() => {
                scene.classList.add('step-show-real');
            }, 3200));

            // 4.5s - 邮筒出现
            timeouts.push(setTimeout(() => {
                scene.classList.add('step-show-postbox');
            }, 4500));

            // 6.0s - 投递仪式
            timeouts.push(setTimeout(() => {
                scene.classList.add('step-deliver');
            }, 6000));

            // 8.5s - 最终文案（含“等待查收”）
            timeouts.push(setTimeout(() => {
                scene.classList.add('step-final-text');
            }, 8500));
        }

        window.onload = () => {
            setTimeout(startAnimation, 500);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L2 领航系统 | 每日效能审计</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif SC', serif;
            background-color: #050b14; 
            color: #e2e8f0;
            min-height: 100vh;
        }
        .terminal-font { font-family: 'JetBrains Mono', monospace; }
        .audit-card {
            background: linear-gradient(180deg, #0a1120 0%, #050b14 100%);
            border: 1px solid #1e293b;
            border-top: 3px solid #00f0ff; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        .input-style {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid #334155;
            width: 100%;
            padding: 12px 16px;
            color: #f8fafc;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .input-style:focus {
            outline: none;
            border-color: #00f0ff;
            box-shadow: 0 0 0 2px rgba(0, 240, 255, 0.15);
        }
        .input-style::placeholder { color: #64748b; }
        
        .progress-bar {
            background: #1e293b;
            height: 4px;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        .progress-fill {
            background: #00f0ff;
            height: 100%;
            width: 100%;
            animation: scan 2s ease-in-out infinite;
        }
        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .sealed { display: none; }
        .cyan-text { color: #00f0ff; }
    </style>
</head>
<body class="p-4 sm:p-6 flex items-center justify-center relative">

    <div class="absolute top-4 left-4 right-4 flex justify-between items-center opacity-40 terminal-font text-[10px] tracking-widest text-[#00f0ff] z-0">
        <span>系统状态: 在线</span>
        <span id="live-time">00:00:00</span>
    </div>

    <div id="main-container" class="audit-card w-full max-w-md p-8 relative z-10 rounded-lg">
        
        <div class="progress-bar"><div class="progress-fill"></div></div>

        <div class="mb-8 text-center">
            <div class="inline-block px-2 py-0.5 bg-[#00f0ff]/10 border border-[#00f0ff]/30 text-[10px] terminal-font uppercase tracking-widest text-[#00f0ff] mb-3">
                L2 长期驻留计划
            </div>
            <h1 class="text-xl font-bold tracking-widest text-white mb-2">每日效能审计终端</h1>
            <p class="text-xs text-gray-500 terminal-font">连线前数据日志</p>
        </div>

        <form id="audit-form" action="https://formspree.io/f/xaqlbegp" method="POST" class="space-y-5">
            <input type="hidden" name="产品类型" value="L2每日打卡审计">
            <input type="hidden" name="打卡日期" id="log-date" value="">
            
            <div>
                <label class="text-xs font-bold text-gray-400 block mb-1">>> 领航员识别码</label>
                <input type="text" name="用户ID" placeholder="请输入您的 ID..." class="input-style" required>
            </div>

            <div>
                <label class="text-xs font-bold text-gray-400 block mb-1">>> 今日有效专注时长 (小时)</label>
                <input type="number" step="0.5" name="专注时长" placeholder="精确到 0.5 小时" class="input-style terminal-font" required>
            </div>

            <div>
                <label class="text-xs font-bold text-gray-400 block mb-1">>> 今日核心任务推进情况</label>
                <textarea name="任务推进" rows="2" placeholder="简述今天最重要的那件事做到了什么程度？" class="input-style" required></textarea>
            </div>

            <div>
                <label class="text-xs font-bold text-gray-400 block mb-1">>> 今日遭遇的最大阻力/情绪消耗点</label>
                <textarea name="核心阻力" rows="2" placeholder="卡在了哪里？是在逃避什么，还是外部干扰？" class="input-style" required></textarea>
            </div>

            <div>
                <label class="text-xs font-bold text-gray-400 block mb-1">>> 明日的 [核心主线]</label>
                <input type="text" name="明日最高优" placeholder="明天如果不做其他事，只做哪一件？" class="input-style" required>
            </div>

            <button type="submit" id="submit-btn" class="w-full py-3 mt-6 bg-transparent border border-[#00f0ff] text-[#00f0ff] hover:bg-[#00f0ff] hover:text-black terminal-font font-bold tracking-[0.1em] transition-all duration-300 rounded">
                <span id="btn-text">锁定数据并申请审计</span>
                <span id="loading" class="hidden animate-pulse">正在同步至主控台...</span>
            </button>
        </form>
    </div>

    <div id="success-message" class="sealed text-center audit-card w-full max-w-md p-10 z-10 rounded-lg">
        <div class="mb-4 text-4xl cyan-text terminal-font">✓</div>
        <h2 class="text-lg font-bold mb-3 text-white terminal-font">数据已锁定</h2>
        <p class="text-sm text-gray-400 leading-relaxed mb-6">
            今日效能数据已同步。<br><br>
            请准备好复盘思路，<br>
            <span class="cyan-text font-bold">22:00 准时接入语音审计。</span>
        </p>
    </div>

    <script>
        document.getElementById('log-date').value = new Date().toLocaleDateString('zh-CN');
        setInterval(() => {
            document.getElementById('live-time').innerText = new Date().toLocaleTimeString('en-US', { hour12: false });
        }, 1000);

        // 自动读取 URL 里的 id 参数并填入输入框锁定
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');
        if(userId) {
            const idInput = document.querySelector('input[name="用户ID"]');
            if(idInput) {
                idInput.value = decodeURIComponent(userId);
                idInput.readOnly = true; 
                idInput.style.opacity = '0.5'; 
                idInput.style.cursor = 'not-allowed';
            }
        }

        const form = document.getElementById('audit-form');
        const btnText = document.getElementById('btn-text');
        const loading = document.getElementById('loading');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            btnText.style.display = 'none';
            loading.classList.remove('hidden');

            const formData = new FormData(form);
            
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    document.getElementById('main-container').classList.add('sealed');
                    document.getElementById('success-message').classList.remove('sealed');
                } else {
                    alert('网络连接错误，请重试');
                    btnText.style.display = 'inline';
                    loading.classList.add('hidden');
                }
            } catch (error) {
                alert('请求超时');
                btnText.style.display = 'inline';
                loading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>

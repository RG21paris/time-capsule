<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辛迪加黑卡 | 巴黎高定终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Noto+Serif+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif SC', serif;
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
        }
        .cinzel-font { font-family: 'Cinzel', serif; }
        .black-card-container {
            background: #050505;
            border: 1px solid #1a1a1a;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
        }
        .input-style {
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            width: 100%;
            padding: 16px 8px;
            color: #fff;
            font-size: 14px;
            transition: all 0.5s ease;
        }
        .input-style:focus {
            outline: none;
            border-bottom: 1px solid #d4af37;
            background: rgba(212, 175, 55, 0.02);
        }
        .input-style::placeholder { color: #333; font-weight: 300; }
        
        .gold-btn {
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }
        .gold-btn:hover {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }
        .sealed { display: none; }
        .black-card-texture {
            position: absolute;
            top: 0; left: 0; right: 0; height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjMDAwIj48L3JlY3Q+CjxyZWN0IHdpZHRoPSIxIiBoZWlnaHQ9IjEiIGZpbGw9IiMxMTEiPjwvcmVjdD4KPC9zdmc+');
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
        }
        .privilege-box {
            border: 1px solid rgba(212, 175, 55, 0.2);
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.05) 0%, transparent 100%);
        }
    </style>
</head>
<body class="p-4 sm:p-8 flex items-center justify-center relative">

    <div id="main-container" class="black-card-container w-full max-w-xl p-10 sm:p-14 z-10 rounded-sm">
        <div class="black-card-texture"></div>
        
        <!-- Header -->
        <div class="mb-12 text-center relative z-10">
            <div class="cinzel-font text-[10px] tracking-[0.5em] text-[#d4af37] mb-6 uppercase">
                Syndicate Black Card
            </div>
            <h1 class="text-3xl font-light tracking-[0.2em] text-white mb-4">巴黎高定控制台</h1>
            <div class="w-8 h-[1px] bg-[#d4af37] mx-auto opacity-50"></div>
        </div>

        <div class="mb-12 text-xs text-gray-500 font-light leading-loose text-center relative z-10 italic">
            "Only the exceptional."<br>
            您已进入全球最高权限通道，巴黎总部为您全天候待命。
        </div>

        <!-- 提交表单 -->
        <form id="audit-form" action="https://formspree.io/f/xaqlbegp" method="POST" class="space-y-10 relative z-10">
            <input type="hidden" name="产品类型" value="辛迪加黑卡高定服务">
            
            <div>
                <label class="cinzel-font text-[10px] text-gray-500 block mb-2 tracking-[0.2em] uppercase">Black Card ID / 黑卡识别码</label>
                <input type="text" name="用户ID" placeholder="请输入您的专属序列号..." class="input-style" required>
            </div>

            <div>
                <label class="cinzel-font text-[10px] text-gray-500 block mb-2 tracking-[0.2em] uppercase">Paris HQ Session / 本月创始人连线议题</label>
                <textarea name="连线议题" rows="2" placeholder="本月您与巴黎总督导的 30 分钟视频，最希望探讨的升学或效能议题是？" class="input-style" required></textarea>
            </div>

            <div>
                <label class="cinzel-font text-[10px] text-gray-500 block mb-2 tracking-[0.2em] uppercase">Haute Couture Delivery / 巴黎高定礼遇收件</label>
                <textarea name="高定收件地址" rows="2" placeholder="确认本学期巴黎实地直邮礼物的收件地址与联系人信息..." class="input-style" required></textarea>
            </div>

            <!-- 核心商业动作：高净值裂变转介绍 -->
            <div class="privilege-box p-6 mt-8 rounded-sm">
                <label class="cinzel-font text-[10px] text-[#d4af37] block mb-3 tracking-[0.2em] uppercase">Privilege Nomination / 黑卡豁免提名 (选填)</label>
                <p class="text-[10px] text-gray-400 leading-relaxed mb-4">
                    凭借您的黑卡身份，您本月可提名 <span class="text-[#d4af37]">1 位</span> 亲友。<br>
                    我们将为其免除 699 元的深度诊断费，直接激活 L2 入营权限。
                </p>
                <input type="text" name="转介绍提名" placeholder="请填写被提名人姓名及联系方式（微信/电话）..." class="input-style border-none bg-black/50 px-4">
            </div>

            <button type="submit" id="submit-btn" class="w-full py-5 mt-4 gold-btn cinzel-font font-bold text-xs uppercase tracking-[0.3em]">
                <span id="btn-text">Submit to Paris HQ</span>
                <span id="loading" class="hidden animate-pulse">Establishing Encrypted Line...</span>
            </button>
        </form>
    </div>

    <!-- 成功界面 -->
    <div id="success-message" class="sealed text-center black-card-container w-full max-w-xl p-16 z-10 rounded-sm">
        <div class="mb-8 text-4xl text-[#d4af37] font-light">♜</div>
        <h2 class="text-xl font-light mb-4 text-white tracking-[0.2em] cinzel-font uppercase">Protocol Activated</h2>
        <p class="text-xs opacity-60 leading-loose mb-10 text-gray-400 font-light">
            总部已接收您的最高级别指令。<br>
            您的总督导连线已进入排期，高定礼遇正在封装。<br><br>
            致以最深厚的敬意。
        </p>
        <div class="w-8 h-[1px] bg-[#d4af37] mx-auto opacity-30"></div>
    </div>

    <script>
        const form = document.getElementById('audit-form');
        const btnText = document.getElementById('btn-text');
        const loading = document.getElementById('loading');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            btnText.style.display = 'none';
            loading.classList.remove('hidden');

            const formData = new FormData(form);
            
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    document.getElementById('main-container').classList.add('sealed');
                    document.getElementById('success-message').classList.remove('sealed');
                } else {
                    alert('Encrypted line busy. Please try again.');
                    btnText.style.display = 'inline';
                    loading.classList.add('hidden');
                }
            } catch (error) {
                alert('Connection timeout.');
                btnText.style.display = 'inline';
                loading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>

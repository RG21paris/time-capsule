<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微光胶囊 | 寄往未来的信</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif SC', serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e94560;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }
        .input-style {
            background: transparent;
            border-bottom: 1px solid rgba(233, 69, 96, 0.3);
            width: 100%;
            padding: 8px 0;
            color: #fff;
            transition: border-color 0.3s;
        }
        .input-style:focus {
            outline: none;
            border-color: #e94560;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .sealed {
            display: none;
        }
        #loading {
            display: none;
        }
    </style>
</head>
<body class="p-6 flex items-center justify-center relative overflow-hidden">
    <!-- 背景星星 -->
    <div id="star-container"></div>

    <div id="form-container" class="glass-card w-full max-w-md p-8 relative z-10 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold tracking-widest mb-2">Lumière 微光胶囊</h1>
            <p class="text-xs opacity-60">—— 此时此刻，即是永恒的起点 ——</p>
        </div>

        <!-- ⚠️ 请在此处替换你的 Formspree ID -->
        <form id="capsule-form" action="https://formspree.io/f/xaqlbegp" method="POST" class="space-y-6">
            <div>
                <label class="text-xs uppercase tracking-tighter opacity-70">1. 你的坐标与心境</label>
                <input type="text" name="坐标与心境" placeholder="例如：巴黎，晴天，心中有些许雀跃" class="input-style" required>
            </div>

            <div>
                <label class="text-xs uppercase tracking-tighter opacity-70">2. 此时最大的压力或困惑</label>
                <textarea name="压力与困惑" rows="3" placeholder="诚实地写下来，交给时空..." class="input-style" required></textarea>
            </div>

            <div>
                <label class="text-xs uppercase tracking-tighter opacity-70">3. 月末最骄傲的一件小事</label>
                <input type="text" name="骄傲小事" placeholder="微小的胜利也值得被放大" class="input-style" required>
            </div>

            <div>
                <label class="text-xs uppercase tracking-tighter opacity-70">4. 对 30 天后自己的咒语</label>
                <input type="text" name="治愈咒语" placeholder="给低谷时的一句慰藉" class="input-style" required>
            </div>

            <div>
                <label class="text-xs uppercase tracking-tighter opacity-70">您的联系方式 (用于 30 天后精准投递)</label>
                <input type="text" name="联系方式" placeholder="企微 ID / 常用 ID" class="input-style" required>
            </div>

            <button type="submit" id="submit-btn" class="w-full py-4 mt-4 bg-[#e94560] text-white rounded-full font-bold tracking-widest hover:bg-[#ff2e63] transition-colors shadow-lg shadow-[#e94560]/30">
                <span id="btn-text">封装胶囊 · 密封</span>
                <span id="loading" class="animate-pulse">正在穿过星际航道...</span>
            </button>
        </form>
    </div>

    <!-- 成功封存界面 -->
    <div id="success-message" class="sealed text-center glass-card p-10 max-w-md z-10">
        <div class="mb-6 text-4xl">✨</div>
        <h2 class="text-xl font-bold mb-4">胶囊已封存</h2>
        <p class="text-sm opacity-80 leading-relaxed mb-6">
            你的思绪已进入时空航道。<br>
            这封信将在 <span id="delivery-date" class="text-[#e94560] font-bold"></span> 准时降落在你的企微。<br><br>
            现在，请回到现实，<br>带着这份微光继续前行。
        </p>
        <button onclick="location.reload()" class="text-xs border border-[#e94560]/30 px-6 py-2 rounded-full opacity-60">返回修改</button>
    </div>

    <script>
        // 初始化背景星星
        const container = document.getElementById('star-container');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.left = `${Math.random() * 100}vw`;
            star.style.top = `${Math.random() * 100}vh`;
            star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
            container.appendChild(star);
        }

        const form = document.getElementById('capsule-form');
        const btnText = document.getElementById('btn-text');
        const loading = document.getElementById('loading');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (form.action.includes("YOUR_ID_HERE")) {
                alert("请先在代码中替换你的 Formspree ID 才能提交哦！");
                return;
            }

            btnText.style.display = 'none';
            loading.style.display = 'inline';

            const formData = new FormData(form);
            
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    const futureDate = new Date();
                    futureDate.setDate(futureDate.getDate() + 30);
                    const dateStr = futureDate.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });

                    document.getElementById('form-container').classList.add('sealed');
                    document.getElementById('success-message').classList.remove('sealed');
                    document.getElementById('delivery-date').innerText = dateStr;
                } else {
                    alert('时空能量不稳定，提交失败，请检查 Formspree 设置');
                    btnText.style.display = 'inline';
                    loading.style.display = 'none';
                }
            } catch (error) {
                alert('连接超时，请检查网络');
                btnText.style.display = 'inline';
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>

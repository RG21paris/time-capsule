<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>左岸21区 · 来自巴黎的惊喜</title>
    <style>
        :root {
            --bg-color: #fdfbf7;
            --envelope-color: #fdfbf7;
            --wax-color: #b91c1c;
            --paris-night: #020617;
            --postbox-yellow: #eab308;
            --gold-main: #D4AF37;
            --gold-light: #F3E5AB;
            --dark-bg: #0A0A0A;
            --dark-panel: #1A1A1A;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-container {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #000;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        /* 初始引导层 */
        #start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 300;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            cursor: pointer;
            transition: opacity 0.8s ease;
        }
        .start-icon {
            width: 70px;
            height: 70px;
            border: 2px solid var(--gold-main);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            animation: pulse-gold 2s infinite;
        }
        @keyframes pulse-gold {
            0% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            70% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 0 15px rgba(212, 175, 55, 0); }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* 音乐按钮 */
        #music-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 150;
            width: 30px;
            height: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 1s;
        }
        #music-toggle.show { opacity: 1; }

        .scene-stage {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease, transform 1s ease;
        }
        .hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }
        .active { opacity: 1; pointer-events: auto; transform: scale(1); }

        /* 场景1：巴黎投递 */
        .paris-real-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&q=80&w=1080');
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2.5s ease-in-out, transform 12s ease-out;
            z-index: 1;
            filter: brightness(0.65);
        }
        .river-reflection {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            background: linear-gradient(transparent, rgba(255,255,255,0.05));
            z-index: 2;
            mix-blend-mode: overlay;
            animation: wave 5s infinite alternate ease-in-out;
            opacity: 0;
        }
        @keyframes wave { from { transform: translateY(0); } to { transform: translateY(8px); } }

        .delivery-envelope {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(2.3); 
            width: 200px;
            height: 140px;
            background: var(--envelope-color);
            border-radius: 2px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.4);
            z-index: 10;
            transition: all 1.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .wax-seal-d21 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 44px;
            height: 44px;
            background: var(--wax-color);
            border-radius: 50%;
            z-index: 12;
            box-shadow: inset 0 0 12px rgba(0,0,0,0.5);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffbba6;
            font-family: serif;
            font-size: 16px;
            font-weight: bold;
        }
        .stamp-tool {
            position: absolute;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 12px;
            background: linear-gradient(to right, #92400e, #fcd34d, #92400e);
            border-radius: 3px;
            z-index: 13;
            transition: top 0.6s ease-in;
        }
        .stamp-tool::before {
            content: '';
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 85px;
            background: linear-gradient(to right, #3e2723, #5d4037, #211512);
            border-radius: 12px 12px 2px 2px;
        }
        .postbox {
            position: absolute;
            bottom: -350px;
            left: 50%;
            transform: translateX(-50%);
            width: 170px;
            height: 280px;
            background: var(--postbox-yellow);
            border-radius: 18px 18px 5px 5px;
            z-index: 20;
            box-shadow: 0 15px 60px rgba(0,0,0,0.8);
            transition: bottom 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        .postbox-slot {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 14px;
            background: #111;
            border-radius: 7px;
        }

        .delivery-text {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            text-align: center;
            width: 100%;
            opacity: 0;
            z-index: 30;
            transition: opacity 2.5s ease;
        }
        .title-main { font-size: 26px; letter-spacing: 8px; display: block; margin-bottom: 10px; font-weight: 300; }
        .title-en { font-size: 13px; letter-spacing: 3px; color: #cbd5e1; display: block; margin-bottom: 35px; }
        .waiting-text { font-size: 20px; letter-spacing: 12px; color: #fcd34d; display: block; opacity: 0; transform: translateY(20px); transition: all 1.8s ease 1.2s; }

        .step-stamp-down .stamp-tool { top: 50%; transform: translate(-50%, -110%); }
        .step-wax-expand .wax-seal-d21 { transform: translate(-50%, -50%) scale(1); }
        .step-stamp-up .stamp-tool { top: -350px; }
        .step-show-real .paris-real-bg { opacity: 1; transform: scale(1.1); }
        .step-show-real .river-reflection { opacity: 1; }
        .step-show-real .delivery-envelope { transform: translate(-50%, -200px) scale(0.42); }
        .step-show-postbox .postbox { bottom: 0; }
        .step-deliver .delivery-envelope { transform: translate(-50%, 125px) scale(0.22) rotateX(45deg); opacity: 0; filter: brightness(0.2); transition: all 1.8s cubic-bezier(0.5, 0, 0.5, 1); }
        .step-final-text .delivery-text { opacity: 1; }
        .step-final-text .waiting-text { opacity: 1; transform: translateY(0); }

        .view-letter-btn {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 40px;
            background: rgba(255,255,255,0.08);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 35px;
            cursor: pointer;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s;
            backdrop-filter: blur(10px);
            font-size: 14px;
            letter-spacing: 2px;
        }
        .step-final-text .view-letter-btn { opacity: 1; pointer-events: auto; }

        /* 场景2：拆封 */
        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: #111;
            border: 1px solid #333;
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid #222;
            transform-origin: top;
            transition: transform 1s ease-in-out;
            z-index: 4;
        }
        .letter-preview {
            position: absolute;
            top: 5px;
            width: 280px;
            height: 180px;
            background-color: #F9F8F5;
            z-index: 2;
            transition: transform 1s ease-in-out 0.5s;
        }
        .ritual-wax-seal {
            position: absolute;
            top: 80px;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #8B0000 30%, #5C0000 80%);
            border-radius: 50%;
            z-index: 5;
            color: var(--gold-main);
            font-weight: bold;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pulse-red 2s infinite;
            transition: opacity 0.5s;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(139, 0, 0, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(139, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(139, 0, 0, 0); }
        }
        .envelope-wrapper.open .flap { transform: rotateX(180deg); }
        .envelope-wrapper.open .ritual-wax-seal { opacity: 0; }
        .envelope-wrapper.open .letter-preview { transform: translateY(-80px); }

        /* 场景3：表单 */
        .letter-container {
            background-color: var(--dark-panel);
            border: 1px solid #333;
            border-top: 3px solid var(--gold-main);
            padding: 40px 30px;
            border-radius: 8px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .letter-title { font-size: 22px; color: var(--gold-main); margin-bottom: 20px; }
        .letter-text { font-size: 14px; line-height: 1.8; color: #CCC; text-align: justify; margin-bottom: 30px; }
        .highlight { color: var(--gold-light); font-weight: bold; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group input, .form-group textarea {
            width: 100%; background-color: #111; border: 1px solid #444; color: var(--gold-light);
            padding: 12px 15px; border-radius: 4px; box-sizing: border-box; font-size: 14px;
        }
        .submit-btn {
            width: 100%; background: linear-gradient(135deg, #C5A059, #D4AF37); color: #000;
            border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer;
        }
        #success-msg { display: none; color: var(--gold-main); font-size: 16px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <audio id="bg-music" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div id="particles"></div>

    <div class="phone-container">
        
        <div id="start-overlay" onclick="handleStart()">
            <div class="start-icon">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--gold-main)" stroke-width="2.5">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
            </div>
            <p style="letter-spacing: 4px;">开启来自巴黎的惊喜</p>
        </div>

        <div id="music-toggle" onclick="toggleMusic()">
            <svg id="music-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
                <path d="M9 18V5l12-2v13"></path>
                <circle cx="6" cy="18" r="3"></circle>
                <circle cx="18" cy="16" r="3"></circle>
            </svg>
        </div>

        <div id="scene-delivery" class="scene-stage active">
            <div class="paris-real-bg"></div>
            <div class="river-reflection"></div>
            <div class="postbox">
                <div class="postbox-slot"></div>
                <div style="position:absolute; top:90px; width:100%; text-align:center; font-weight:900; color:#111; font-size:14px;">LA POSTE</div>
            </div>
            <div class="delivery-envelope" id="delivery-envelope"><div class="wax-seal-d21">D21</div></div>
            <div class="stamp-tool" id="stamp-tool"></div>
            <div class="delivery-text">
                <span class="title-main">一份来自巴黎的惊喜</span>
                <span class="title-en">A SURPRISE FROM PARIS</span>
                <span class="waiting-text">等待查收</span>
            </div>
            <button class="view-letter-btn" onclick="goToOpeningRitual()">揭开这份惊喜</button>
        </div>

        <div id="scene-ritual" class="scene-stage hidden">
            <div style="display:flex; flex-direction:column; align-items:center;">
                <div class="envelope-wrapper" id="ritual-envelope" onclick="openLetterRitual()">
                    <div class="letter-preview"></div>
                    <div class="flap"></div>
                    <div class="ritual-wax-seal">L</div>
                </div>
                <div style="margin-top:40px; color:#888; letter-spacing:2px; font-size:14px;">点击开启 · 巴黎直邮终极仪式</div>
            </div>
        </div>

        <div id="scene-form" class="scene-stage hidden">
            <div class="letter-container">
                <div class="letter-title">创始人亲笔火漆信</div>
                <div class="letter-text">
                    恭喜你，完成了这场艰苦但卓绝的效能进阶之旅。<br><br>
                    效能系统已经为你重塑，为了铭记这一极具多巴胺的时刻，我们从塞纳河畔为你寄出了一份跨越 8000 公里的 <span class="highlight">「彼岸存在感」</span> 实物礼赠。<br><br>
                    请留下你的坐标，等待来自巴黎的晚风。
                </div>
                <form id="address-form" action="https://formspree.io/f/xaqlbegp" method="POST" onsubmit="submitForm(event)">
                    <div class="form-group"><input type="text" name="姓名" placeholder="收件人姓名" required></div>
                    <div class="form-group"><input type="tel" name="电话" placeholder="联系电话" required></div>
                    <div class="form-group"><textarea name="地址" placeholder="详细收件地址" required></textarea></div>
                    <button type="submit" class="submit-btn">确认开启巴黎直邮</button>
                </form>
                <div id="success-msg">✨ 地址已收到！<br>实体火漆信正在打包中，敬请期待。</div>
            </div>
        </div>
    </div>

    <script>
        const sceneDelivery = document.getElementById('scene-delivery');
        const overlay = document.getElementById('start-overlay');
        const bgMusic = document.getElementById('bg-music');
        const musicToggle = document.getElementById('music-toggle');
        let deliveryTimeouts = [];

        function handleStart() {
            bgMusic.play().catch(e => console.log(e));
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                musicToggle.classList.add('show');
                startDeliveryAnimation();
            }, 850);
        }

        function startDeliveryAnimation() {
            deliveryTimeouts.push(setTimeout(() => sceneDelivery.classList.add('step-stamp-down'), 700));
            deliveryTimeouts.push(setTimeout(() => sceneDelivery.classList.add('step-wax-expand'), 1200));
            deliveryTimeouts.push(setTimeout(() => sceneDelivery.classList.add('step-stamp-up'), 2200));
            deliveryTimeouts.push(setTimeout(() => sceneDelivery.classList.add('step-show-real'), 3500));
            deliveryTimeouts.push(setTimeout(() => sceneDelivery.classList.add('step-show-postbox'), 4800));
            deliveryTimeouts.push(setTimeout(() => sceneDelivery.classList.add('step-deliver'), 6500));
            deliveryTimeouts.push(setTimeout(() => sceneDelivery.classList.add('step-final-text'), 8800));
        }

        function goToOpeningRitual() {
            sceneDelivery.classList.remove('active');
            sceneDelivery.classList.add('hidden');
            setTimeout(() => {
                document.getElementById('scene-ritual').classList.remove('hidden');
                document.getElementById('scene-ritual').classList.add('active');
                createGoldParticles();
            }, 1000);
        }

        function openLetterRitual() {
            document.getElementById('ritual-envelope').classList.add('open');
            createGoldParticles();
            setTimeout(() => {
                document.getElementById('scene-ritual').classList.remove('active');
                document.getElementById('scene-ritual').classList.add('hidden');
                document.getElementById('scene-form').classList.remove('hidden');
                document.getElementById('scene-form').classList.add('active');
            }, 2000);
        }

        async function submitForm(event) {
            event.preventDefault();
            const form = event.target;
            const submitBtn = form.querySelector('.submit-btn');
            submitBtn.innerText = '正在封装信件...';
            submitBtn.disabled = true;

            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });
                if (response.ok) {
                    form.style.display = 'none';
                    document.getElementById('success-msg').style.display = 'block';
                    createGoldParticles();
                } else {
                    alert("提交失败，请检查网络");
                    submitBtn.innerText = '确认开启巴黎直邮';
                    submitBtn.disabled = false;
                }
            } catch (error) {
                alert("提交出错");
                submitBtn.innerText = '确认开启巴黎直邮';
                submitBtn.disabled = false;
            }
        }

        function createGoldParticles() {
            const container = document.getElementById('particles');
            const colors = ['#D4AF37', '#F3E5AB', '#FFFFFF'];
            for (let i = 0; i < 60; i++) {
                const p = document.createElement('div');
                const size = Math.random() * 6 + 2;
                p.style.cssText = `width:${size}px; height:${size}px; background:${colors[Math.floor(Math.random()*3)]}; position:absolute; border-radius:50%; left:50%; top:50%; z-index:100; pointer-events:none;`;
                const tx = (Math.random() - 0.5) * 800;
                const ty = (Math.random() - 0.7) * 800;
                p.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], { duration: 1500, easing: 'cubic-bezier(0, .9, .57, 1)', fill: 'forwards' });
                container.appendChild(p);
                setTimeout(() => p.remove(), 2500);
            }
        }

        function toggleMusic() {
            if (bgMusic.paused) { bgMusic.play(); document.getElementById('music-icon').style.stroke = "#fff"; }
            else { bgMusic.pause(); document.getElementById('music-icon').style.stroke = "#666"; }
        }
    </script>
</body>
</html>

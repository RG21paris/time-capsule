<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cristal 凝光胶囊 | 季度追踪</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif SC', serif;
            background: radial-gradient(circle at top right, #001f3f 0%, #000814 100%);
            min-height: 100vh;
            color: #00d2ff;
        }
        .crystal-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.1);
        }
        .input-style {
            background: transparent;
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
            width: 100%;
            padding: 10px 0;
            color: #fff;
            transition: all 0.3s;
        }
        .input-style:focus {
            outline: none;
            border-color: #00d2ff;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.1);
        }
        .voucher-box {
            background: linear-gradient(135deg, rgba(0, 210, 255, 0.1) 0%, rgba(0, 210, 255, 0.05) 100%);
            border: 1px dashed rgba(0, 210, 255, 0.4);
        }
        .sealed { display: none; }
        .shine {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: rotate(45deg);
            animation: moveShine 4s infinite;
        }
        @keyframes moveShine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
    </style>
</head>
<body class="p-6 flex items-center justify-center relative overflow-x-hidden">

    <div id="main-container" class="crystal-card w-full max-w-md p-8 relative z-10 overflow-hidden">
        <div class="shine"></div>
        
        <div class="text-center mb-8">
            <div class="inline-block px-3 py-1 border border-[#00d2ff] rounded-full text-[10px] uppercase tracking-widest mb-4">
                Quarterly Premium
            </div>
            <h1 class="text-2xl font-bold tracking-widest mb-2 text-white">Cristal 凝光胶囊</h1>
            <p class="text-xs opacity-60">—— 季度锁定，让改变折射光芒 ——</p>
        </div>

        <!-- 福利领取区 -->
        <div class="voucher-box rounded-xl p-4 mb-8 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-2xl">☕</span>
                <div>
                    <h3 class="text-sm font-bold text-white">季度数字咖啡券</h3>
                    <p class="text-[10px] opacity-60">一杯咖啡钱，换一个季度的陪伴</p>
                </div>
            </div>
            <button onclick="alert('礼券已激活！请联系左岸观察员领取券码')" class="bg-[#00d2ff] text-[#000814] text-[10px] font-bold px-3 py-1.5 rounded-lg shadow-lg">
                立即领取
            </button>
        </div>

        <!-- 提交表单区 -->
        <form id="capsule-form" action="https://formspree.io/f/xaqlbegp" method="POST" class="space-y-6">
            <input type="hidden" name="产品等级" value="凝光胶囊 Cristal">
            
            <div>
                <label class="text-[10px] uppercase tracking-widest opacity-50">1. 季度核心锚点</label>
                <input type="text" name="季度锚点" placeholder="未来三个月，你最想折射出哪种色彩？" class="input-style" required>
            </div>

            <div>
                <label class="text-[10px] uppercase tracking-widest opacity-50">2. 当前身处的人生季节</label>
                <textarea name="人生季节" rows="2" placeholder="是播种的春日，还是沉淀的严冬？" class="input-style" required></textarea>
            </div>

            <div>
                <label class="text-[10px] uppercase tracking-widest opacity-50">3. 给季末自己的一句叮嘱</label>
                <input type="text" name="季末叮嘱" placeholder="当 90 天后的你回头看时..." class="input-style" required>
            </div>

            <div>
                <label class="text-[10px] uppercase tracking-widest opacity-50">您的联系方式 (用于投递与报告发送)</label>
                <input type="text" name="联系方式" placeholder="企微 ID / 常用 ID" class="input-style" required>
            </div>

            <button type="submit" id="submit-btn" class="w-full py-4 mt-4 bg-white text-[#000814] rounded-xl font-bold tracking-widest hover:bg-[#00d2ff] hover:text-white transition-all duration-500 shadow-xl">
                <span id="btn-text">封装季度胶囊</span>
                <span id="loading" class="hidden animate-pulse">正在凝结时光晶体...</span>
            </button>
        </form>
    </div>

    <!-- 成功界面 -->
    <div id="success-message" class="sealed text-center crystal-card p-10 max-w-md z-10">
        <div class="mb-6 text-4xl">💎</div>
        <h2 class="text-xl font-bold mb-4 text-white">凝光已就位</h2>
        <p class="text-sm opacity-80 leading-relaxed mb-8">
            你的季度愿景已进入观测轨道。<br>
            除了月度信件，我们将在季末为你生成专属的<br>
            <span class="text-[#00d2ff] font-bold">《轨迹报告 · Cristal PDF》</span>。<br><br>
            感谢你对“慢情绪”的长期投资。
        </p>
        <button onclick="location.reload()" class="text-[10px] opacity-40 hover:opacity-100">返回修改</button>
    </div>

    <script>
        const form = document.getElementById('capsule-form');
        const btnText = document.getElementById('btn-text');
        const loading = document.getElementById('loading');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            btnText.style.display = 'none';
            loading.classList.remove('hidden');

            const formData = new FormData(form);
            
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    document.getElementById('main-container').classList.add('sealed');
                    document.getElementById('success-message').classList.remove('sealed');
                } else {
                    alert('网络波动，请稍后再试');
                    btnText.style.display = 'inline';
                    loading.classList.add('hidden');
                }
            } catch (error) {
                alert('连接超时');
                btnText.style.display = 'inline';
                loading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
